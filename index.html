<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER SANTIAGO BINGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;500;600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* --- 1. การตั้งค่าหน้าเว็บหลัก --- */
        body { 
            background-color: #0f1923; 
            color: white; 
            font-family: 'Kanit', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            width: 100%;
        }

        /* --- 2. หัวข้อ MASTER SANTIAGO (ม่วงเรืองแสง) --- */
        h1.header-glow { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 3rem; 
            letter-spacing: 6px; 
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px #8057ff, 0 0 20px #8057ff;
            margin: 30px 0 10px 0;
            text-align: center;
        }

        .sub-header-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 40px;
            text-shadow: 0 0 5px #fff;
            opacity: 0.8;
        }

        /* --- 3. แผงควบคุมและปุ่ม (ม่วงลาเวนเดอร์ ตัวบาง อ่านง่าย) --- */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 25px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 550px; 
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        
        input { 
            flex: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #444; 
            background: #1a2531; color: white; font-family: 'Kanit', sans-serif;
        }

        .btn-primary { 
            background-color: #726bff; 
            color: #ffffff !important; 
            font-family: 'Kanit', sans-serif; 
            font-size: 16px; 
            font-weight: 500; /* ตัวบางลงตามที่ต้องการ */
            letter-spacing: 0.5px; 
            text-shadow: none !important; /* ปิดความฟุ้งเพื่อให้คมชัด */
            padding: 10px 25px; 
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover { background-color: #5c54ff; transform: translateY(-1px); }

        /* --- 4. ตารางบิงโก (ตรงกลางหน้าจอ) --- */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 40px auto; /* จัดกลาง */
            padding: 20px;
        }

        .bingo-cell {
            background-color: #ffffff; 
            color: #000000; 
            font-family: 'Montserrat', 'Kanit', sans-serif; 
            font-size: 1.1rem;
            font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 15px; border-radius: 15px;
            min-height: 110px; aspect-ratio: 1 / 1;
            transition: all 0.2s ease; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-shadow: none !important;
        }

        /* --- 5. ช่องพิเศษ JJAZ (เด่นที่สุด) --- */
        #special-cell {
            background: linear-gradient(135deg, #726bff 0%, #a8a4ff 100%) !important;
            color: #ffffff !important;
            font-family: 'Orbitron', sans-serif !important;
            font-size: 1.8rem !important;
            font-weight: 900 !important;
            letter-spacing: 3px;
            border: 4px solid #ffb02e !important; /* ขอบทอง Radiant */
            box-shadow: 0 0 20px rgba(114, 107, 255, 0.6);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1.03); }
            50% { transform: scale(1.07); box-shadow: 0 0 25px rgba(255, 176, 46, 0.7); }
            100% { transform: scale(1.03); }
        }

        .marked { background-color: #726bff !important; color: #ffffff !important; transform: scale(0.95); }
        .footer-text { color: #555; font-size: 12px; margin-top: 20px; }
        .refresh-button { background: rgba(77, 166, 255, 0.1); color: #4da6ff; border: 1px solid #4da6ff; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header-glow">MASTER SANTIAGO</h1>
        <p class="sub-header-glow">WATCH PARTY WITH JJAZ</p>

        <div class="control-panel card">
            <div class="input-group">
                <input type="text" id="username" placeholder="Twitch/Youtube name">
                <button onclick="generateBingo()" class="btn-primary">Generate Bingo</button>
            </div>
            <div class="refresh-area">
                <button id="updateBtn" onclick="handleUpdate()" class="refresh-button">🔄 Refresh</button>
            </div>
        </div>

        <div id="bingo-board" class="bingo-grid">
            </div>

        <p class="footer-text">Watch Party with JJAZ420</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
