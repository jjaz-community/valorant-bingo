<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJAZ Valorant Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="setup-section" class="card">
            <h1>JJAZ BINGO</h1>
            <p>ใส่ชื่อเพื่อร่วมสนุกกับ Watch Party</p>
            <input type="text" id="username" placeholder="พิมพ์ชื่อของคุณที่นี่..." autofocus>
            <button onclick="generateBingo()" class="generate-btn">GENERATE BINGO</button>
        </div>

        <div id="main-content" style="display:none;">
            
            <div class="update-area">
                <button id="updateBtn" onclick="handleUpdate()" class="update-button">
                    <span id="btnIcon">🔄</span> <span id="btnText">อัปเดตแต้ม</span>
                </button>
                <p id="cooldownMsg"></p>
            </div>

            <div id="bingo-board" class="bingo-grid">
                </div>
            
            <p class="footer-text">เมื่อบิงโกแล้ว อย่าลืมพิมพ์บอกในสตรีมด้วยนะ!</p>
        </div>
    </div>

    <style>
        body { background-color: #0f1923; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 10px; text-align: center; }
        
        /* สไตล์ปุ่มอัปเดต */
        .update-area { text-align: center; margin-bottom: 20px; }
        .update-button {
    background-color: #ff4655;
    color: white;
    /* --- ปรับ 3 บรรทัดนี้ให้เล็กลง --- */
    padding: 8px 16px;      /* ลดขนาดขอบจาก 12px 25px เป็น 8px 16px */
    font-size: 13px;       /* ลดขนาดตัวอักษรลง */
    border-radius: 3px;    /* ปรับความโค้งให้เล็กลงตามขนาดปุ่ม */
    /* ------------------------------ */
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 2px 8px rgba(255, 70, 85, 0.3); /* ลดเงาลงให้ดูเบาขึ้น */
}
        .update-button:hover { background-color: #cf3a46; transform: translateY(-2px); }
        .update-button:disabled { background-color: #444; cursor: not-allowed; transform: none; }
        
        #cooldownMsg { color: #888; font-size: 12px; margin-top: 8px; height: 15px; }

        /* สไตล์ตารางบิงโก */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .bingo-cell {
            background: rgba(255, 255, 255, 0.1);
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 5px; font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 4px;
        }
        .marked { background-color: #ff4655 !important; color: white; font-weight: bold; }
        
        .generate-btn {
            background-color: #ece8e1; color: #0f1923; padding: 15px 30px;
            border: none; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
