<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JJAZ Valorant Bingo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="bingo-modal">
        <div class="modal-content">
            <h1 class="victory-text">BINGO VICTORY!</h1>
            <div class="video-container">
                <iframe id="jjaz-video" width="100%" height="100%" 
                    src="https://www.youtube.com/embed/B60Z6Kaa4sE?enablejsapi=1&autoplay=0&mute=0&loop=1&playlist=B60Z6Kaa4sE" 
                    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
            <br>
            <button class="close-btn" onclick="closeBingoModal()">CLOSE</button>
        </div>
    </div>

    <h1 class="title">MASTER SANTIAGO</h1>
    <div class="author">Watch Party with JJAZ</div>

    <div class="controls">
        <input id="name" placeholder="Twitch / YouTube username">
        <button onclick="gen()">Generate Bingo</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
    <button id="updateBtn" onclick="handleUpdate()" class="update-button">
        <span id="btnIcon">🔄</span> <span id="btnText">Update Bingo</span>
    </button>
    <p id="cooldownMsg" style="color: #666; font-size: 12px; margin-top: 5px; height: 15px;"></p>
</div>

<style>
    .update-button {
        background-color: #ff4655;
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(255, 70, 85, 0.3);
    }
    .update-button:hover { background-color: #cf3a46; transform: translateY(-2px); }
    .update-button:disabled { background-color: #444; cursor: not-allowed; }
</style>
    
    <div id="board" class="grid"></div>

    <div class="watermark">
        <span>Customized by</span>
        <div>BUTTERCUP</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
