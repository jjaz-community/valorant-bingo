<!DOCTYPE html>
<html lang="th">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJAZ Valorant Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>MASTER SANTIAGO</h1>

        <div class="control-panel card">
            <div class="input-group">
                <input type="text" id="username" placeholder="Twicht/Youtube name" autofocus>
                <button onclick="generateBingo()" class="btn-primary">Generate Bingo</button>
            </div>
            
            <div class="refresh-area">
                <button id="updateBtn" onclick="handleUpdate()" class="refresh-button">
                    <span id="btnIcon">🔄</span> <span id="btnText">Refresh</span>
                </button>
                <p id="cooldownMsg"></p>
            </div>
        </div>

        <div id="bingo-board" class="bingo-grid">
    <p style="grid-column: span 5; color: #ece8e1; margin-top: 50px; font-weight: bold; font-family: 'Kanit', sans-serif;">
        กรุณาใส่ชื่อแล้วกด Generate Bingo
    </p>
</div>
    <style>
        body { background-color: #0f1923; color: white; font-family: 'Segoe UI', sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        h1 { 
    font-family: 'Oswald', sans-serif; 
    font-size: 3.5rem; 
    letter-spacing: 4px; 
    color: #ff4655; 
    text-shadow: 2px 2px 0px #ece8e1; 
    text-transform: uppercase; 
    margin: 20px 0; 
}

body { 
    background-color: #0f1923; 
    color: white; 
    font-family: 'Kanit', sans-serif; /* ใช้ Kanit ให้ทั้งเว็บดูโมเดิร์นขึ้น */
}
        .card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #1f2933; color: white; }
        
        .btn-primary { background: #ece8e1; color: #0f1923; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .refresh-button {
            background-color: #ff4655; color: white; padding: 6px 14px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .refresh-button:disabled { background-color: #444; }

        .bingo-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            max-width: 500px; width: 100%; background: rgba(255, 255, 255, 0.02);
            padding: 10px; border-radius: 8px; min-height: 300px;
        }
        .bingo-cell {
            background: rgba(255, 255, 255, 0.1); aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 5px; font-size: 11px; border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .marked { background-color: #ff4655 !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #cooldownMsg { font-size: 11px; color: #888; margin-top: 5px; height: 12px; }
    </style>

    <script src="script.js"></script>
</body>
</html>
